<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Again</title>
    <style>
        body { background-color: skyblue; }
        #bird { width: 50px; height: 40px; background-color: yellow; position: absolute; left: 100px; }
        @keyframes flap { 0% { transform: translateY(0); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="bird"></div>
    <script>
        let bird = document.getElementById('bird');
        let isFlapping = false;

        document.addEventListener('keydown', function(event) {
            if (event.code === 'Space') {
                isFlapping = true;
                bird.style.animation = 'flap 0.5s';
                setTimeout(() => {
                    bird.style.animation = '';
                }, 500);
            }
        });
    </script>
</body>
</html>
