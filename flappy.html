<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Flappy Bird Raw-HTML/CSS/JS</title>
    <style>
    body {
        background: #71c5cf;
        margin: 0;
        overflow: hidden;
        height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;    
    }
    #bird {
        position: absolute;
        width: 38px;
        height: 26px;
        background: #ffcc00;
        border-radius: 18px;
        left: 120px;
        transition: transform 0.1s; 
        box-shadow:inset -3px -3px 0 rgba(0,0,0,0.1);
        z-index: 5;
        border: 2px solid #000;
    }
    /* The Eye*/
    #bird::before {
        content:"";
        position: absolute;
        top: 4px;
        right: 8px;
        width: 6px;
        height: 6px;
        background: white;
        border-radius: 50%;
        border: 1px solid #000;

    }
    /* the beak*/
    #bird::after {
        content:"";
        position: absolute;
        top: 10px;
        right: -10px;
        width: 12px;
        height: 10px;
        background: #ff5722;
        border: 2px solid #000;
        border-radius: 2px 8px 8px 2px;

    }
    /* the wing*/
    #bird-wing{
        position: absolute;
        top: 10px;
        left: 5px;
        width: 15px;
        height: 10px;
        background: #f4b400;
        border: 2px solid #000;
        border-radius: 5px 5px 15px 15px;
        animation: flap 0.3s infinite alternate; 
    }

    @keyframes flap {
        from { transform: rotate(0deg); }
        to { transform: rotate(-40deg); }
    }
    .pipe {
        position: absolute;
        width: 70px;
        background: linear-gradient(#5ac45a,#3e9e3e);
        border: 4px solid #2e7d32;
        border-radius: 8px;
        box-sizing: border-box;
    }
    .pipe-top {
        transform-origin: bottom;
    }
    .pipe-bottom {
        transform-origin: top;
    }
    #score {
        position: absolute;
        top: 40px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 60px;
        font-weight: bold;
        color: white;
        text-shadow: 3px 3px 0 #000,-3px 3px 0 #000,3px -3px 0 #000,-3px -3px 0 #000;
        pointer-events: none;
        z-index: 10;
        display: none; /* Hidden on home screen */
    }
    /* New UI Screen Styles */
    .ui-screen {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 20;
        text-shadow: 2px 2px 4px #000;
    }
    .ui-screen h1 {
        font-size: 60px;
        margin: 0 0 20px 0;
        color: #ffcc00;
    }
    .score-board {
        background: #ded895;
        border: 4px solid #c7b56f;
        border-radius: 10px;
        padding: 20px 40px;
        text-align: center;
        color: #333;
        text-shadow: none;
        margin-bottom: 30px;
        font-weight: bold;
    }
    .score-board p {
        margin: 10px 0;
        font-size: 24px;
    }
    .score-board span {
        font-size: 32px;
        color: #d9534f;
    }
    button.play-btn {
        background: #5ac45a;
        border: 4px solid #2e7d32;
        border-radius: 8px;
        color: white;
        font-size: 30px;
        padding: 10px 40px;
        cursor: pointer;
        font-weight: bold;
        text-shadow: 1px 1px 2px #000;
        transition: transform 0.1s;
    }
    button.play-btn:active {
        transform: scale(0.95);
    }
    .ground {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 120px;
        background: #ded895;
        border-top: 8px solid #c7b56f;
        z-index: 15;
    }
    </style>
</head>
<body>
<div id="game">
    <div id="bird"></div>
    <div id="score">0</div>
    <div class="ground"></div>

    <div id="home-screen" class="ui-screen">
        <h1>Flappy Bird</h1>
        <div class="score-board">
            <p>Score: <span id="recent-score-display">0</span></p>
            <p>Best: <span id="high-score-display">0</span></p>
        </div>
        <button class="play-btn" id="start-btn">PLAY</button>
        <p style="font-size: 16px; margin-top: 20px;">Or press Spacebar to start</p>
    </div>
</div>

<script>
const game = document.getElementById('game');
const bird = document.getElementById('bird');
const scoreEl = document.getElementById('score');
const homeScreen = document.getElementById('home-screen');
const recentScoreDisplay = document.getElementById('recent-score-display');
const highScoreDisplay = document.getElementById('high-score-display');
const startBtn = document.getElementById('start-btn');

let birdY = 250;
let velocity = 0;
let gravity = 0.5;
let jumpPower = -9;
let pipes = [];
let score = 0;
let gameActive = false;
let gameSpeed = 2.5;
let frame = 0;

// Load high score from local storage, or default to 0
let highScore = localStorage.getItem('flappyHighScore') || 0;
highScoreDisplay.textContent = highScore;

function initHome() {
    gameActive = false;
    homeScreen.style.display = 'flex';
    scoreEl.style.display = 'none';
    
    // Position bird nicely for the home screen
    birdY = window.innerHeight / 2;
    bird.style.top = birdY + 'px';
    bird.style.transform = 'rotate(0deg)';
}

function startGame() {
    // Reset variables
    birdY = window.innerHeight / 2;
    velocity = 0;
    score = 0;
    frame = 0;
    scoreEl.textContent = "0";
    
    // Clear old pipes
    pipes.forEach(p => {
        p.top.remove();
        p.bottom.remove();
    });
    pipes = [];
    
    // Update UI
    homeScreen.style.display = 'none';
    scoreEl.style.display = 'block';
    gameActive = true;
    
    jump(); // Initial jump
}

function gameOver() {
    gameActive = false;
    
    // Update Scores
    recentScoreDisplay.textContent = score;
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('flappyHighScore', highScore); // Save to browser
    }
    highScoreDisplay.textContent = highScore;
    
    // Show home screen again
    setTimeout(() => {
        homeScreen.style.display = 'flex';
        scoreEl.style.display = 'none';
    }, 500); // Small half-second delay so it's not jarring
}

function createPipe() {
    const gap = 160; 
    const minHeight = 50;
    const maxHeight = window.innerHeight - gap - minHeight - 120; 
    const topHeight = Math.floor(Math.random() * (maxHeight - minHeight) + minHeight);
    
    const pipeTop = document.createElement('div');
    pipeTop.className = 'pipe pipe-top';
    pipeTop.style.height = topHeight + 'px';
    pipeTop.style.left = window.innerWidth + 'px';
    pipeTop.style.top = '0px';

    const pipeBottom = document.createElement('div');
    pipeBottom.className = 'pipe pipe-bottom';
    pipeBottom.style.height = (window.innerHeight - topHeight - gap - 120) + 'px';
    pipeBottom.style.left = window.innerWidth + 'px';
    pipeBottom.style.bottom = '120px';

    game.appendChild(pipeTop);
    game.appendChild(pipeBottom);
    pipes.push({top: pipeTop, bottom: pipeBottom, scored: false});
}

function jump() {
    if (!gameActive) {
        if (homeScreen.style.display === 'flex') {
            startGame();
        }
        return;
    }
    velocity = jumpPower;
}

function update(){
    requestAnimationFrame(update); 

    if (!gameActive) return;

    // Bird physics
    velocity += gravity;
    birdY += velocity;
    bird.style.top = birdY +'px';

    // Rotate bird
    let rot = Math.min(Math.max(velocity * 4, -30), 90);
    bird.style.transform = `rotate(${rot}deg)`;

    // Ground and Ceiling collision
    if (birdY + 24 > window.innerHeight - 120 || birdY < 0){
        gameOver();
        return;
    }

    // Move and check pipes
    for (let i = pipes.length - 1; i >= 0; i--){
        const p = pipes[i];
        let x = parseFloat(p.top.style.left) - gameSpeed;
        p.top.style.left = x + 'px';
        p.bottom.style.left = x + 'px';
        
        // Remove off-screen pipes
        if (x < -80){
            p.top.remove();
            p.bottom.remove();
            pipes.splice(i,1);
            continue;
        }
        
        // Score
        if (!p.scored && x + 70 < 120){
            p.scored = true;
            score++;
            scoreEl.textContent = score;
        }
        
        // Collision detection basic AABB
        const birdRect = {
            left: 120, right: 154, top: birdY, bottom: birdY + 24
        };
        const topPipeRect = {
            left: x, right: x + 70, top : 0, bottom: parseFloat(p.top.style.height)
        };
        const botPipeRect = {
            left: x, right: x + 70, 
            top: window.innerHeight - 120 - parseFloat(p.bottom.style.height), 
            bottom: window.innerHeight - 120
        };

        if (
            birdRect.right > botPipeRect.left && birdRect.left < botPipeRect.right && birdRect.bottom > topPipeRect.top && birdRect.top < topPipeRect.bottom 
        ){
            gameOver();
        }
        
        if (
            birdRect.right > botPipeRect.left && birdRect.left < botPipeRect.right && birdRect.bottom > botPipeRect.top && birdRect.top < botPipeRect.bottom
        ){
            gameOver();
        }
    }
    
    // Add new pipes
    frame++;
    if (frame % 110 === 0){
        createPipe();
    }
}

// Controls
window.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { 
        e.preventDefault();
        jump();
    }
});

// Start button click logic
startBtn.addEventListener('click', (e) => {
    e.stopPropagation(); // Prevents the window click from triggering immediately
    startGame();
});

window.addEventListener('click', () => {
    if (gameActive) jump();
});

window.addEventListener('touchstart', e => {
    if (e.target !== startBtn) {
        e.preventDefault(); 
        if (gameActive) jump();
    }
}, {passive: false});

// Initialize the game state
initHome();
update();

</script>
</body>
</html>
